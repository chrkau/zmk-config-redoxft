# RGB - 35 LEDów per-key na każdej połówce
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Wyświetlacz nice!view
CONFIG_ZMK_DISPLAY=y

# Moc nadawcza BT (jak w Twoim corne)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Sleep + nazwa klawiatury
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_KEYBOARD_NAME="Redox FT"

# ZMK Studio
CONFIG_ZMK_STUDIO=y

# Pointing (Twój EXTRA layer używa mmv/mkp/msc)
CONFIG_ZMK_POINTING=y

# Eager debouncing (Twoje ustawienie z corne)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7

# Wyłącz auto-restart RGB po wybudzeniu - oszczędza baterię
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
