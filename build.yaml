# Konfiguracja matrycy buildów dla GitHub Actions.
# Redox z nice!view (lewa = central, prawa = peripheral).
# settings_reset to firmware do wyczyszczenia BLE/ustawień, gdyby coś.
---
include:
  - board: nice_nano_v2
    shield: redox_left nice_view_adapter nice_view
    snippet: studio-rpc-usb-uart
  - board: nice_nano_v2
    shield: redox_right nice_view_adapter nice_view
  - board: nice_nano_v2
    shield: settings_reset
